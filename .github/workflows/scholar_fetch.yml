name: Fetch Scholar Stats

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6am UTC
  workflow_dispatch:        # also lets you trigger it manually from GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Google Scholar stats
        run: |
          pip install scholarly --quiet
          python3 << 'PYEOF'
          import json
          from scholarly import scholarly

          try:
              author = scholarly.search_author_id('qMNZlnEAAAAJ')
              author = scholarly.fill(author, sections=['basics', 'indices'])
              stats = {
                  'citations': author.get('citedby', 0),
                  'h_index':   author.get('hindex', 0),
                  'i10_index': author.get('i10index', 0),
                  'fetched':   __import__('datetime').date.today().isoformat(),
                  'source':    'live'
              }
          except Exception as e:
              print(f"Fetch failed: {e}")
              # Write a marker so the site knows fetch was attempted but failed
              stats = {'source': 'error', 'error': str(e)}

          with open('scholar_stats.json', 'w') as f:
              json.dump(stats, f)
          print(json.dumps(stats, indent=2))
          PYEOF

      - name: Commit stats file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scholar_stats.json
          git diff --cached --quiet || git commit -m "Update Scholar stats $(date -u +%Y-%m-%d)"
          git push
